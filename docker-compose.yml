version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: inquira-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: inquira-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped